name: linkSpec
description: "LinkSpec - Domain-Gated Professional Networking App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  web: ^1.0.0

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2 # Critical for Flutter 3.41+ compatibility

  # Backend & Database
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0
  flutter_web_plugins:
    sdk: flutter

  # Utilities (Restored)
  intl: ^0.19.0
  timeago: ^3.6.1
  cached_network_image: ^3.3.1
  file_picker: ^8.1.7 # Restored for document and image picking on Web
  flutter_image_compress: ^2.3.0 # Restored for image optimization

  # UI Enhancements
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  share_plus: ^12.0.1
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.5.3
  lottie: ^3.3.1
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  flutter_dotenv: ^5.2.1
  crypto: ^3.0.3

  # NOTE: 'mailer' remains removed as it is strictly incompatible with Web (requires dart:io)
  # Use Supabase Auth for all email flows

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/
    - assets/.env

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/apply_wizz_logo.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/apply_wizz_logo.jpg"
  min_sdk_android: 21
